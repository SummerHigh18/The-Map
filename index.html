<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ts is the css OF leaflet -->
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/> 

    <!-- and this is the js for Leaflet -->
      <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <link rel="stylesheet" href="map.css">
    <title>The_Map</title>
</head>
<body>
    <div id="main">
        <div id="stamp-wrap">
            <div id="stamp">
                <div id="stamp-inner">
                    <div id="stamp-top">
                        <div id="name">
                            01
                            <span>INDIA</span>
                        </div>
                        <div id="flag">
                            <img src="https://flags.restcountries.com/v5/w640/in.png" alt="">
                        </div>
                    </div>
                    <div id="info-bar">
                        <div class="info-row">
                            <span class="key">Capital</span>
                            <span class="value capital">
                                <ul>
                                    <li>Delhi</li>
                                </ul>
                            </span>
                        </div>
                        <div class="info-row">
                            <span class="key">Population</span>
                            <span class="value pop">1.4 Billion</span>
                        </div>
                        <div class="info-row">
                            <span class="key">Area</span>
                            <span class="value area">3.1 Million</span>
                        </div>
                        <div class="info-row currency">
                            <span class="key">Currency</span>
                            <span class="value">Indian Rupee</span>
                        </div>
                        <div class="info-row">
                            <span class="key" id="timezone-parent">Time Zone(s)</span>
                            <span class="value timezone">
                                <ul>
                                    <li>UTC +5:30</li>

                                </ul>
                            </span>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>
    
    <script type="module" src="map.js" ></script>
</body>
</html>
